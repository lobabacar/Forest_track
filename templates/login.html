<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — ForestTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root { --forest-dark:#1b3a2f; --forest-mid:#2d5a45; --forest-pale:#e8f5ee; }
    body { background: linear-gradient(135deg, #1b3a2f 0%, #2d5a45 50%, #3d7a5e 100%);
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
                  width: 100%; max-width: 420px; overflow: hidden; }
    .login-header { background: var(--forest-dark); padding: 2rem; text-align: center; }
    .login-header h1 { color: #fff; font-size: 1.6rem; font-weight: 700; margin: .5rem 0 0; }
    .login-header .icon { font-size: 2.5rem; color: #7ed4a7; }
    .login-body { padding: 2rem; }
    .btn-login { background: var(--forest-mid); border: none; color: #fff;
                 padding: .7rem; font-weight: 600; width: 100%; border-radius: 8px; }
    .btn-login:hover { background: var(--forest-dark); color: #fff; }
    .demo-box { background: var(--forest-pale); border-radius: 8px; padding: 1rem;
                font-size: .82rem; margin-top: 1.5rem; border: 1px solid #c4dfd0; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-header">
    <div class="icon"><i class="bi bi-tree-fill"></i></div>
    <h1>Forest<span style="color:#7ed4a7">Track</span></h1>
    <p class="text-white-50 small mb-0">Suivi de matériel forestier</p>
  </div>
  <div class="login-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show py-2 small">
        {{ msg }}<button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
      </div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Adresse email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control" required autofocus placeholder="votre@email.com">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold small">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="mot_de_passe" id="mdpInput" class="form-control" required placeholder="••••••••">
          <button type="button" class="btn btn-outline-secondary" onclick="toggleMdp()">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" name="remember" class="form-check-input" id="remember">
        <label class="form-check-label small" for="remember">Se souvenir de moi</label>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>
    </form>
    <div class="demo-box">
      <p class="fw-semibold mb-2 text-muted"><i class="bi bi-info-circle me-1"></i>Comptes de démonstration</p>
      <div class="mb-1 d-flex align-items-center gap-2">
        <span class="badge bg-danger">Admin</span>
        <code class="small">btlo@foresttrack.ca</code>
        <span class="text-muted small">/#</span>
      </div>
      <div class="mb-1 d-flex align-items-center gap-2">
        <span class="badge bg-primary">Gérant</span>
        <code class="small">mmbengue@foresttrack.ca</code>
        <span class="text-muted small">/#</span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge bg-secondary">Opérateur</span>
        <code class="small">othiam@foresttrack.ca</code>
        <span class="text-muted small">/#</span>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleMdp() {
  const inp = document.getElementById('mdpInput');
  const ico = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ico.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
