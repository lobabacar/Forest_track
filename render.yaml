services:
  - type: web
    name: foresttrack
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///forestier.db
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 0